<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Andres Villarosa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #eee;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: black;
    font-size: 28px;
}

/* SECTIONS */
h2 {
    margin: 30px 20px 10px;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
}

/* ONE SHOTS */
.manga-list {
    padding: 20px;
}

.manga-item {
    margin-bottom: 10px;
}

.manga-item a {
    color: #ccc;
    text-decoration: none;
    font-size: 18px;
}

.manga-item a:hover {
    color: white;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX BACKDROP */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

/* IMAGE */
.lightbox img {
    max-width: 90%;
    max-height: 90%;
    cursor: grab;
    user-select: none;
    transition: transform 0.05s;
}

/* ARROW BUTTONS */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    color: white;
    background: rgba(0,0,0,0.4);
    border: none;
    cursor: pointer;
    padding: 10px 15px;
    z-index: 1001;
}

.arrow.left { left: 20px; }
.arrow.right { right: 20px; }

/* UI */
.ui {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 1000;
}

.ui button {
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
}

/* disable scroll when lightbox open */
body.no-scroll {
    overflow: hidden;
}
</style>
</head>

<body>

<header>Andres Villarosa</header>

<!-- ONE SHOTS -->
<h2>One-Shots</h2>
<div class="manga-list">

    <div class="manga-item">
        <a href="assets/oneshots/tinola-war/tinola-war.html">Tinola War</a>
    </div>

    <div class="manga-item">
        <a href="manga2.html">One-shot #2 – Title Here</a>
    </div>

</div>

<!-- GALLERY -->
<h2>Illustrations</h2>
<div class="gallery">
    <img src="art1.jpg">
    <img src="assets/illustrations/page2.jpg">
    <img src="assets/illustrations/page3.jpg">
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

    <!-- arrows -->
    <button class="arrow left" id="prev">‹</button>
    <button class="arrow right" id="next">›</button>

    <img id="img">
</div>

<!-- UI -->
<div class="ui">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
    <button onclick="resetZoom()">Reset</button>
</div>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const img = document.getElementById("img");

const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

let index = 0;

/* ===== zoom / drag state ===== */
let scale = 1;
let x = 0, y = 0;
let dragging = false;
let startX, startY;

/* ===== OPEN ===== */
images.forEach((el, i) => {
    el.addEventListener("click", () => {
        index = i;
        open();
    });
});

function open() {
    lightbox.style.display = "flex";
    document.body.classList.add("no-scroll");

    img.src = images[index].src;
    resetZoom();
}

/* ===== CLOSE ===== */
lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) close();
});

function close() {
    lightbox.style.display = "none";
    document.body.classList.remove("no-scroll");
}

/* ===== UPDATE ===== */
function update() {
    img.style.transform = `scale(${scale}) translate(${x}px, ${y}px)`;
}

/* ===== ZOOM BUTTONS ===== */
function zoomIn() {
    scale = Math.min(scale + 0.3, 5);
    update();
}

function zoomOut() {
    scale = Math.max(scale - 0.3, 1);
    update();
}

function resetZoom() {
    scale = 1;
    x = 0;
    y = 0;
    update();
}

/* ===== FIXED DRAG (no accidental toggle feeling) ===== */
img.addEventListener("mousedown", (e) => {
    dragging = true;
    startX = e.clientX - x;
    startY = e.clientY - y;
    img.style.cursor = "grabbing";
    e.preventDefault();
});

window.addEventListener("mousemove", (e) => {
    if (!dragging) return;

    x = e.clientX - startX;
    y = e.clientY - startY;
    update();
});

window.addEventListener("mouseup", () => {
    dragging = false;
    img.style.cursor = "grab";
});

/* ===== SCROLL ZOOM (FIXED - no page scroll) ===== */
lightbox.addEventListener("wheel", (e) => {
    e.preventDefault();

    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(1, scale), 5);
    update();
}, { passive: false });

/* ===== ARROWS (KEYBOARD) ===== */
window.addEventListener("keydown", (e) => {
    if (lightbox.style.display !== "flex") return;

    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
    if (e.key === "Escape") close();
});

/* ===== ARROWS (CLICKABLE) ===== */
prevBtn.addEventListener("click", prev);
nextBtn.addEventListener("click", next);

function prev() {
    index = (index - 1 + images.length) % images.length;
    open();
}

function next() {
    index = (index + 1) % images.length;
    open();
}
</script>

</body>
</html>
