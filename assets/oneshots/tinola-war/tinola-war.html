<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tinola War</title>

<style>
body {
    margin: 0;
    background: #000;
}

/* container for vertical reading */
.reader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

/* normal pages */
.reader img {
    width: 100%;
    max-width: 800px;
    height: auto;
}

/* spreads (double-page pages) */
.reader img.spread {
    max-width: 1400px;
}
</style>
</head>

<body>

<div class="reader">

    <img src="page1.jpg">
    <img src="page2.jpg">
    <img src="page3.jpg">
    <!-- DOUBLE PAGE SPREAD -->
    <img src="page4.jpg" class="spread">

</div>

</body>
</html>
